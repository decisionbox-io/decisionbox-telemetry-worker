name = "decisionbox-telemetry"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Custom domain: telemetry.decisionbox.io
# Configure via: wrangler deploy && wrangler domains add telemetry.decisionbox.io

[[d1_databases]]
binding = "DB"
database_name = "decisionbox-telemetry"
database_id = "2dd5d131-be61-45ac-be43-317c933cca91"

# Daily reports are triggered by GitHub Actions (more reliable than CF free-plan crons).
# See: .github/workflows/daily-report.yml
#
# Secrets (set via wrangler secret put):
#   SLACK_WEBHOOK_URL  — Slack incoming webhook URL
#   ADMIN_API_KEY      — Admin token for POST /v1/report
